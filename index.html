<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신비 첫 돌잔치 💕</title>
    <!-- 카톡 썸네일 OG 태그 추가 -->
    <meta property="og:title" content="🎉 신비 첫 번째 돌잔치 초대장 🎉">
    <meta property="og:description" content="2026년 4월 12일 마키노차야 세종점에서 신비의 소중한 1살을 축하합니다 💕">
    <meta property="og:image" content="images/invitation_img05.jpg">
    <meta property="og:url" content="https://dryad20000.github.io/1st_invitation/">
    <meta property="og:type" content="website">
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; padding: 20px; background: linear-gradient(to bottom, #ffeef8, #f0f8ff); color: #333; text-align: center; }
        h1 { font-size: 2.5em; color: #ff69b4; margin: 20px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        .info { background: white; margin: 20px auto; padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); max-width: 400px; }
        .info h2 { color: #ff1493; font-size: 1.5em; }
        .info p { font-size: 1.2em; margin: 10px 0; }
        @media (max-width: 480px) {
          .info h2, .info p { font-size: 1em; } /* 모바일 폰트 조정 */
        }
        iframe { width: 100%; height: 300px; border: none; border-radius: 15px; margin: 20px 0; }
        .photos {
          display: flex;
          overflow-x: auto;
          overflow-y: hidden;
          scroll-snap-type: x mandatory;
          gap: 15px;
          padding: 20px 10px;
          scrollbar-width: none;
        }
        .photos::-webkit-scrollbar { display: none; }
        .photos img {
          flex: 0 0 80%;
          max-width: 280px;
          height: 250px;
          object-fit: cover;
          border-radius: 15px;
          scroll-snap-align: center;
        }
        .photos img:hover { transform: scale(1.02); }
        /* 1. 이미지 복사 완전 차단 */
        img {
          -webkit-user-drag: none;
          -khtml-user-drag: none;
          -moz-user-drag: none;
          -o-user-drag: none;
          user-drag: none;
          pointer-events: none;
          -webkit-user-select: none;
          -moz-user-select: none;
          -ms-user-select: none;
          user-select: none;
        }

        /* 2. 개발자도구 우회 방지 */
        body::before {
          content: "💕 가족만 볼 수 있는 돌잔치 초대장 💕";
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: rgba(255,255,255,0.9);
          z-index: 99999;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 24px;
          pointer-events: none;
          opacity: 0;
          transition: opacity 0.3s;
        }
        @media (max-width: 768px) { 
          body::before { display: none; } /* 모바일은 표시 안함 */
        }
        
        /* 🔥 PC(데스크톱)에서만 가로 스크롤 */
        @media screen and (min-width: 769px) {
          .photos {
            overflow-x: auto;  /* PC: 가로 스크롤 활성화 */
          }
        }

    </style>
</head>
<body>
    <!-- 비밀번호 화면 (전체 덮음) -->
    <div id="password-screen" style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:#ffeef8;display:flex;align-items:center;justify-content:center;z-index:9999;">
    <div style="background:white;padding:40px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.3);text-align:center;">
        <h2 style="color:#ff69b4;">💕 신비 돌잔치 초대장 💕</h2>
        <p>비밀번호를 입력해주세요</p>
        <input type="password" id="passcode" placeholder="신비생일" maxlength="4" style="padding:15px;font-size:18px;border:2px solid #ff69b4;border-radius:10px;width:200px;">
        <br><br>
        <button onclick="checkPassword()" style="padding:15px 30px;background:#ff69b4;color:white;border:none;border-radius:15px;font-size:16px;cursor:pointer;">입장하기</button>
    </div>
    </div>
    <h1>신비 첫 번째 돌잔치 💕🎉</h1>
    
    <!-- 기존 초대장 내용 (숨김) -->
    <div id="main-content" style="display:none;">
        <div class="info">
            <h2>📅 일시</h2>
            <p>2026년 4월 12일 (일) 오후 1:00</p>
            
            <h2>📍 장소</h2>
            <p>마키노차야 세종점</p>
            <p>주소: 세종 도움1로 7 베스트웨스턴플러스호텔 3층</p>
            
            <h2>👶 1년 성장 사진 모음 💕</h2>
            <div class="photos">
                <img src="images/invitation_img05.jpg" alt="img05">
                <img src="images/invitation_img01.jpg" alt="img01">
                <img src="images/invitation_img02.jpg" alt="img02">
                <img src="images/invitation_img03.jpg" alt="img03">
                <img src="images/invitation_img04.jpg" alt="img04">
                <img src="images/invitation_img06.jpg" alt="img06">
                <img src="images/invitation_img07.jpg" alt="img07">
                <img src="images/invitation_img08.jpg" alt="img08">
                <img src="images/invitation_img09.jpg" alt="img09">
                <img src="images/invitation_img10.jpg" alt="img10">
            </div>
            
            <h2>🗺️ 찾아오는 길</h2>
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3207.232287808512!2d127.25843629999999!3d36.5002545!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x357acbba6303d7f7%3A0x4a77f5320699bb5c!2z67Kg7Iqk7Yq47Juo7Iqk7YS07ZSM65-s7Iqk7Zi47YWU7IS47KKF!5e0!3m2!1sko!2skr!4v1774412616726!5m2!1sko!2skr" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
    </div>

    <script>
    function checkPassword() {
      const input = document.getElementById('passcode').value;
      if (input === '0415') {  // 원하는 비번으로 변경
        document.getElementById('password-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
      } else {
        alert('비밀번호를 확인해주세요 💕');
        document.getElementById('passcode').value = '';
      }
    }
    // Enter키 지원
    document.getElementById('passcode').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') checkPassword();
    });

    // 3. 우클릭·드래그·단축키 완전 차단
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('selectstart', e => e.preventDefault());
    document.addEventListener('dragstart', e => e.preventDefault());
    document.onkeydown = e => {
      if(e.keyCode==123 || e.ctrlKey && e.shiftKey && e.keyCode==73) return false;
    };
    
    // 4. 이미지 저장 방지
    document.querySelectorAll('img').forEach(img => {
      img.ondragstart = () => false;
      img.oncontextmenu = () => false;
    });
    </script>
</body>
</html>
